name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout electron project (inside project dir)
        uses: actions/checkout@v4
        with:
          repository: Faicad/3d_viewer_electron
          path: 3d_viewer_electron

      - name: Create electron-src symlink (for Vite build)
        shell: bash
        run: ln -sf 3d_viewer_electron/src/renderer electron-src

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: package.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Unit tests (node)
        run: pnpm exec vitest run

      - name: Component tests (jsdom)
        run: pnpm exec vitest run --config vitest.jsdom.config.ts

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Rust lint
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Build frontend
        run: pnpm run build

      - name: Build Rust (debug)
        run: cargo build --manifest-path src-tauri/Cargo.toml

      - name: Build installer (tauri build)
        run: pnpm exec tauri build

      - name: Verify installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          Write-Host "Installer: $($installer.FullName)"

          $proc = Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait -PassThru
          Write-Host "Installer exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) { throw "Installer failed with exit code $($proc.ExitCode)" }

          # Wait a bit for the installation to settle
          Start-Sleep -Seconds 3

          # Search for the installed executable in common locations
          $searchPaths = @(
            "$env:LOCALAPPDATA\Programs",
            "${env:ProgramFiles}",
            "${env:ProgramFiles(x86)}",
            "$env:USERPROFILE\AppData\Local\Programs"
          )
          $exe = $null
          foreach ($base in $searchPaths) {
            $found = Get-ChildItem -Path $base -Filter "3D Model Viewer.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $exe = $found.FullName; break }
          }
          # Fallback: search entire ProgramData for any exe from this app
          if (-not $exe) {
            $exe = Get-ChildItem -Path "$env:LOCALAPPDATA" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -like "*3D Model Viewer*" } | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $exe) {
            Get-ChildItem "$env:LOCALAPPDATA\Programs" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName | Out-Host
            throw "Installed executable not found"
          }
          Write-Host "Installed: $exe"
          Get-ChildItem (Split-Path $exe)

          $proc = Start-Process -FilePath $exe -PassThru
          $exited = $proc.WaitForExit(10000)
          if (-not $exited) { $proc.Kill(); Write-Host "App ran for 10s (success)" }
          else { Write-Host "App exited with code $($proc.ExitCode)" }

      - name: Verify installer (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          appimage=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          echo "AppImage: $appimage"
          chmod +x "$appimage"
          timeout 10 xvfb-run -a "$appimage" --no-sandbox 2>&1 || true

      - name: Verify installer (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          dmg=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          echo "DMG: $dmg"
          hdiutil attach "$dmg" -nobrowse -mountpoint /tmp/vdmg
          ls -la /tmp/vdmg/
          app=$(ls -d /tmp/vdmg/*.app | head -1)
          echo "App bundle: $app"
          cp -R "$app" /tmp/Viewer.app
          hdiutil detach /tmp/vdmg
          timeout 10 /tmp/Viewer.app/Contents/MacOS/* 2>&1 || true
